<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photos — Family Hub</title>

  <!--
    FONT: Both DM Serif Display (display headings) and Nunito (body)
    loaded so photos page matches the dashboard's type palette exactly.
  -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Core stylesheet — matches family-hub.css design system -->
  <link rel="stylesheet" href="css/photos.css" />

  <!-- Mobile nav utility (hamburger etc.) — unchanged -->
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>

  <!--
    TOP-LEVEL SHELL
    ───────────────
    .app-wrapper = flex row (sidebar | main-content)
    Matches the .layout pattern from family-hub.html.

    CHANGE FROM ORIGINAL: Added <header> above the flex shell so the
    page has the same sticky pink header as the dashboard.
    SAFE BECAUSE: <header> is new markup; no existing JS references it.
    nav.js injects into <aside class="sidebar"> as before.
  -->

  <!-- ── HEADER (new, matches family-hub.html exactly) ─── -->
  <header>
    <span class="header-title">🏠 Family Hub</span>
    <div class="header-status">
      <span class="status-dot"></span>
      <span id="memberOnlineCount">Photos</span>
    </div>
  </header>

  <div class="app-wrapper">

    <!-- ── SIDEBAR ── -->
    <!--
      id not used by JS. nav.js targets <aside class="sidebar"> or
      <nav class="sidebar"> — both are valid; using <aside> as original.
    -->
    <aside class="sidebar" id="sidebar"><!-- injected by nav.js --></aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="main-content">

      <!-- Page heading -->
      <!--
        CHANGE FROM ORIGINAL: Wrapped existing <h1> and <p> in a
        .page-header <div> matching family-hub.html structure.
        SAFE BECAUSE: No JS references this wrapper div.
      -->
      <div class="page-header">
        <h1>📸 Family Photos</h1>
        <p>Your family's shared memories</p>
      </div>

      <!-- ── UPLOAD ZONE ─────────────────────────────────────────
           id="upload-zone"        → JS: zone variable, drag/drop listeners
           id="file-input"         → JS: fileInput variable, change listener
           id="upload-title"       → JS: reads .value in uploadFiles()
           id="upload-btn"         → JS: uploadBtn variable, display toggle
           onclick="uploadFiles(event)" → JS function, preserved exactly
           All attributes, ids, and event handlers are 100% preserved.
      ──────────────────────────────────────────────────────────── -->
      <div class="upload-zone" id="upload-zone"
           onclick="document.getElementById('file-input').click()">

        <input type="file" id="file-input" accept="image/*" multiple />

        <div class="icon">📤</div>
        <strong>Click or drag photos here to upload</strong>
        <p>JPG, PNG, GIF, WebP — up to 10 MB each</p>

        <!--
          CHANGE FROM ORIGINAL: onclick on these inputs had a bug in
          original ("onclick="e => e.stopPropagation()"" — arrow fn as
          string doesn't work). Changed to correct inline syntax.
          SAFE BECAUSE: The original stopPropagation was broken/no-op;
          fixing it to work correctly is safe and improves UX (clicking
          the text input won't trigger the file dialog).
        -->
        <input
          type="text"
          class="upload-title-input"
          id="upload-title"
          placeholder="Photo title (optional)"
          onclick="event.stopPropagation()"
        />

        <button
          class="upload-btn"
          id="upload-btn"
          style="display:none"
          onclick="uploadFiles(event)"
        >
          Upload Photos
        </button>
      </div>

      <!-- Progress indicator — id="upload-progress", toggled by JS -->
      <div id="upload-progress" style="display:none"></div>

      <!-- ── PHOTO GRID ──────────────────────────────────────────
           id="photo-grid" populated entirely by loadPhotos() in JS.
           JS renders .photo-item divs with:
             onclick="openLightbox(...)"   → lightbox
             .delete-photo-btn             → deletePhoto(event, id)
           The .photo-grid-full class is the CSS grid wrapper.
           CHANGE: renamed container class from .photo-grid-full to
           keep same class but give it the correct CSS.
           id="photo-grid" preserved — required by JS.
      ──────────────────────────────────────────────────────────── -->
      <div class="photo-grid-full" id="photo-grid">
        <!-- Rendered by loadPhotos() -->
        <p style="color:var(--text-muted);grid-column:1/-1;padding:24px 0">
          Loading photos…
        </p>
      </div>

    </main>
  </div><!-- /.app-wrapper -->


  <!-- ── LIGHTBOX ───────────────────────────────────────────────
       id="lightbox"         → JS: classList.add('open') / .remove('open')
       id="lightbox-img"     → JS: .src = url
       id="lightbox-caption" → JS: .textContent = caption
       .lightbox-close       → onclick="closeLightbox()"
       onclick="closeLightbox()" on the outer lightbox div preserved.
       SAFE BECAUSE: All ids and the .open toggle class are identical.
  ──────────────────────────────────────────────────────────── -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close" role="button" aria-label="Close lightbox">✕</span>
    <!--
      stopPropagation on img click so clicking the photo itself
      doesn't immediately close the lightbox.
      SAFE: JS only closes on the outer div onclick; this is additive.
    -->
    <img id="lightbox-img" src="" alt=""
         onclick="event.stopPropagation()" />
    <div id="lightbox-caption"></div>
  </div>


  <!-- ── SCRIPTS ─────────────────────────────────────────────── -->
  <!--
    Script order matches original exactly:
      1. api.js        — defines api, requireAuth, getUser, showToast
      2. nav.js        — defines buildNav(), injects sidebar HTML
      3. mobile-nav.js — hamburger behaviour (deferred)
      4. Inline script — page logic (calls api, nav, renders grid)

    No scripts modified, removed, or reordered.
  -->
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/mobile-nav.js" defer></script>

  <script>
    /*
      ─────────────────────────────────────────────────────────────
      ALL BUSINESS LOGIC BELOW IS 100% IDENTICAL TO THE ORIGINAL.
      No functions renamed. No API calls changed. No data flow
      altered. Only the photo card HTML template has cosmetic
      tweaks (class names for CSS styling) — functional attrs
      (onclick, id, src, alt) are untouched.
      ─────────────────────────────────────────────────────────────
    */

    if (!requireAuth()) throw new Error();
    buildNav('photos');

    let selectedFiles = [];
    const fileInput = document.getElementById('file-input');
    const uploadBtn = document.getElementById('upload-btn');
    const zone      = document.getElementById('upload-zone');

    /* ── Drag & Drop ── */
    zone.addEventListener('dragover', (e) => {
      e.preventDefault();
      zone.classList.add('drag-over');
    });

    zone.addEventListener('dragleave', () => {
      zone.classList.remove('drag-over');
    });

    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      selectedFiles = Array.from(e.dataTransfer.files)
        .filter(f => f.type.startsWith('image/'));
      if (selectedFiles.length) {
        uploadBtn.style.display = 'inline-block';
        uploadBtn.textContent   = `Upload ${selectedFiles.length} photo(s)`;
      }
    });

    fileInput.addEventListener('change', () => {
      selectedFiles = Array.from(fileInput.files);
      if (selectedFiles.length) {
        uploadBtn.style.display = 'inline-block';
        uploadBtn.textContent   = `Upload ${selectedFiles.length} photo(s)`;
      }
    });

    /* ── Upload ── */
    async function uploadFiles(e) {
      e.stopPropagation();
      if (!selectedFiles.length) return;
      uploadBtn.disabled = true;
      const prog  = document.getElementById('upload-progress');
      prog.style.display = 'block';
      const title = document.getElementById('upload-title').value.trim();

      for (let i = 0; i < selectedFiles.length; i++) {
        prog.textContent = `Uploading ${i + 1}/${selectedFiles.length}…`;
        const fd = new FormData();
        fd.append('image', selectedFiles[i]);
        fd.append('title', title || selectedFiles[i].name);
        try {
          await api.uploadPhoto(fd);
        } catch (err) {
          showToast('Upload failed: ' + err.message);
        }
      }

      prog.textContent = '✅ Upload complete!';
      setTimeout(() => { prog.style.display = 'none'; }, 2000);
      uploadBtn.disabled          = false;
      uploadBtn.style.display     = 'none';
      selectedFiles               = [];
      fileInput.value             = '';
      document.getElementById('upload-title').value = '';
      await loadPhotos();
    }

    /* ── Load Photos ── */
    async function loadPhotos() {
      const grid = document.getElementById('photo-grid');
      try {
        const photos = await api.getPhotos();

        if (!photos.length) {
          /*
            CHANGE FROM ORIGINAL: improved empty-state markup.
            SAFE: No JS reads or targets this empty-state content.
          */
          grid.innerHTML = `
            <div class="photos-empty">
              <div class="empty-icon">📷</div>
              <div class="empty-title">No photos yet</div>
              <div class="empty-sub">Upload your first one above!</div>
            </div>`;
          return;
        }

        /*
          CHANGE FROM ORIGINAL: photo card template uses new CSS
          class names (.photo-overlay, .title, .meta) but the
          functional attributes are identical:
            - onclick="openLightbox(...)"  ← unchanged
            - class="delete-photo-btn"     ← unchanged (used by CSS :hover)
            - onclick="deletePhoto(event,'${p._id}')"  ← unchanged
            - img src, alt, loading        ← unchanged
          The only diff is cosmetic wrapper classes for styling.
        */
        grid.innerHTML = photos.map((p) => `
          <div class="photo-item"
               onclick="openLightbox('http://localhost:5000${p.imageUrl}','${esc(p.title)}')">

            <img src="http://localhost:5000${p.imageUrl}"
                 alt="${esc(p.title)}"
                 loading="lazy" />

            <button
              class="delete-photo-btn"
              onclick="deletePhoto(event, '${p._id}')"
              title="Delete photo">🗑</button>

            <div class="photo-overlay">
              <div class="title">${esc(p.title)}</div>
              <div class="meta">by ${esc(p.uploadedByName)} · ${fmtDate(p.uploadedAt)}</div>
            </div>

          </div>
        `).join('');

      } catch (err) {
        grid.innerHTML =
          `<p style="color:#ffb3b3;padding:24px 0;grid-column:1/-1">
             Failed to load photos: ${err.message}
           </p>`;
      }
    }

    /* ── Delete Photo ── */
    async function deletePhoto(e, id) {
      e.stopPropagation();
      if (!confirm('Delete this photo?')) return;
      try {
        await api.deletePhoto(id);
        showToast('Photo deleted');
        await loadPhotos();
      } catch (err) {
        showToast('Delete failed: ' + err.message);
      }
    }

    /* ── Lightbox ── */
    function openLightbox(url, caption) {
      document.getElementById('lightbox-img').src          = url;
      document.getElementById('lightbox-caption').textContent = caption;
      document.getElementById('lightbox').classList.add('open');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeLightbox();
    });

    /* ── Helpers ── (identical to original) */
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }

    function fmtDate(iso) {
      return iso
        ? new Date(iso).toLocaleDateString('en-IN', {
            day: 'numeric', month: 'short', year: 'numeric'
          })
        : '';
    }

    /* ── Init ── */
    loadPhotos();
  </script>

</body>
</html>
