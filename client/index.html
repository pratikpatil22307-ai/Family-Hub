<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Hub — Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- FullCalendar v6 (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/mobile.css" />
</head>
<body>

  <!-- ── TOP HEADER ──────────────────────────────── -->
  <header class="fh-header">
    <span class="fh-header-title">🏠 Family Hub</span>
    <span class="fh-header-right" id="nav-user-name"></span>
  </header>

  <div class="fh-layout">

    <!-- ── SIDEBAR NAV ─────────────────────────────── -->
    <nav class="fh-sidebar" id="sidebar"><!-- injected by nav.js if present --></nav>

    <!-- ── MAIN AREA ───────────────────────────────── -->
    <main class="fh-main">

      <div class="page-header">
        <h1 class="page-title">📅 Family Calendar</h1>
        <p class="page-sub">All family events in one place</p>
      </div>

      <!-- Two-column layout: calendar + upcoming panel -->
      <div class="cal-layout">

        <!-- FullCalendar wrapper -->
        <div class="cal-card glass">
          <div id="fc-calendar"></div>
        </div>

        <!-- Upcoming Events panel -->
        <aside class="upcoming-panel">
          <div class="stat-box glass upcoming-card">
            <div class="up-header">
              <span class="up-icon">📌</span>
              <span class="up-title">Upcoming Events</span>
            </div>
            <div id="upcoming-list">
              <div class="up-loading">Loading…</div>
            </div>
            <a href="events.html" class="card-link">View all events →</a>
          </div>
        </aside>

      </div><!-- /cal-layout -->

    </main>
  </div>

  <!-- ── EVENT DETAIL MODAL ──────────────────────── -->
  <div id="event-modal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-card glass">
      <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
      <div class="modal-cat-badge" id="modal-cat"></div>
      <h2 class="modal-title" id="modal-title"></h2>
      <div class="modal-meta" id="modal-meta"></div>
      <p class="modal-desc" id="modal-desc"></p>
      <div class="modal-actions">
        <a href="events.html" class="btn btn-ghost">Manage Events</a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/api.js"></script>
  <!-- nav.js is optional; gracefully skipped if absent -->
  <script>
    // Inline fallback nav in case nav.js isn't loaded
    if (typeof buildNav === 'undefined') {
      window.buildNav = function(active) {
        const links = [
          { href:'family-hub.html', icon:'🏡', label:'Dashboard', id:'dashboard' },
          { href:'index.html',      icon:'📅', label:'Calendar',  id:'calendar'  },
          { href:'events.html',     icon:'🎉', label:'Events',    id:'events'    },
          { href:'photos.html',     icon:'🖼️', label:'Photos',    id:'photos'    },
          { href:'chat.html',       icon:'💬', label:'Chat',      id:'chat'      },
        ];
        const sb = document.getElementById('sidebar');
        if (!sb) return;
        sb.innerHTML = `
          <div style="padding:14px 10px 6px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)">Menu</div>
          ${links.map(l=>`<a href="${l.href}" class="nav-item${l.id===active?' active':''}" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;text-decoration:none;color:var(--text-muted);font-weight:600;font-size:0.95rem;transition:background 0.15s,color 0.15s;">
            <span style="width:20px;text-align:center">${l.icon}</span>${l.label}</a>`).join('')}
          <hr style="border:none;border-top:1px solid var(--border);margin:10px 0"/>
          <div style="padding:10px 12px;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted)">Account</div>
          <div id="nav-user-name-sb" class="nav-item" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--text-muted);font-weight:600;font-size:0.95rem;"></div>
          <div class="nav-item" onclick="logout()" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:rgba(231,76,60,0.9);font-weight:600;font-size:0.95rem;cursor:pointer;">🚪 Logout</div>
        `;
        const user = getUser();
        if (user) {
          const el = document.getElementById('nav-user-name-sb');
          if (el) el.textContent = '👤 ' + user.name;
        }
      };
    }
  </script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');
    const _user = getUser();
    if (_user) {
      const el = document.getElementById('nav-user-name');
      if (el) el.textContent = '👤 ' + _user.name;
    }
    if (typeof buildNav === 'function') buildNav('calendar');
  </script>
  <script src="js/script.js"></script>
</body>
</html>
