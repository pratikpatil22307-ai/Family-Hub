<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Hub — Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/chat.css" />
  <link rel="stylesheet" href="css/chat-inline.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <style>
    .typing-indicator { font-size:0.8rem; color:#aaa; padding:4px 16px; min-height:22px; font-style:italic; }
    .msg-bubble.me { background:linear-gradient(135deg,#6c63ff,#764ba2); color:#fff; margin-left:auto; }
    .msg-bubble.other { background:rgba(255,255,255,0.85); color:#2d3436; }
    .msg-bubble { max-width:72%; padding:10px 14px; border-radius:16px; margin:4px 16px; font-size:0.93rem; line-height:1.4; }
    .msg-meta { font-size:0.75rem; opacity:0.7; margin-top:3px; }
    #messages { flex:1; overflow-y:auto; padding:12px 0; display:flex; flex-direction:column; }
    .connection-banner { background:#e74c3c; color:#fff; text-align:center; padding:6px; font-size:0.85rem; display:none; }
  </style>
</head>
<body>
  <header>
    <span class="header-title">🏠 Family Hub</span>
    <div class="header-status">
      <span class="status-dot" id="conn-dot"></span>
      <span id="memberCount">Connecting…</span>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar"><!-- injected --></nav>

    <main class="chat-main" style="display:flex;flex-direction:column;height:calc(100vh - 64px);overflow:hidden">
      <div class="connection-banner" id="conn-banner">⚠️ Disconnected — trying to reconnect…</div>
      <div class="chat-header" style="padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.1)">
        <h2 style="font-size:1.1rem;font-weight:800">💬 Family Chat</h2>
        <span id="family-name-label" style="font-size:0.85rem;color:#aaa"></span>
      </div>

      <div id="messages"></div>
      <div class="typing-indicator" id="typing-indicator"></div>

      <div class="chat-input-row" style="padding:12px 16px;display:flex;gap:10px;border-top:1px solid rgba(255,255,255,0.1)">
        <input type="text" id="messageInput" placeholder="Type a message…"
          style="flex:1;padding:12px 16px;border-radius:24px;border:2px solid rgba(108,99,255,0.3);background:rgba(255,255,255,0.9);font-family:inherit;font-size:0.95rem;outline:none" />
        <button id="sendBtn" onclick="sendMsg()"
          style="background:linear-gradient(135deg,#6c63ff,#764ba2);color:#fff;border:none;border-radius:50%;width:44px;height:44px;font-size:1.2rem;cursor:pointer">➤</button>
      </div>
    </main>
  </div>

  <!-- Socket.IO from CDN -->
<script src="/socket.io/socket.io.js"></script>
  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/mobile-nav.js" defer></script>
  <script>
    if (!requireAuth()) throw new Error();
    const user = getUser();
    buildNav('chat');

    document.getElementById('family-name-label').textContent = user.familyName || 'My Family';

    const messagesEl = document.getElementById('messages');
    const input = document.getElementById('messageInput');
    const typingEl = document.getElementById('typing-indicator');
    let typingTimer;
    let isTyping = false;

    // Load message history from REST first
    async function loadHistory() {
      try {
        const msgs = await api.getMessages(50);
        msgs.forEach(m => appendMessage(m, false));
        scrollToBottom();
      } catch (err) {
        console.error('Failed to load history:', err);
      }
    }

    // Socket.IO connection
    const socket = io("/", {
  auth: { token: getToken() },
  reconnection: true,
  reconnectionDelay: 1000,
});

    socket.on('connect', () => {
      document.getElementById('conn-dot').style.background = '#00b894';
      document.getElementById('memberCount').textContent = `${user.familyName || 'Family'} Chat`;
      document.getElementById('conn-banner').style.display = 'none';
    });

    socket.on('disconnect', () => {
      document.getElementById('conn-dot').style.background = '#e74c3c';
      document.getElementById('conn-banner').style.display = 'block';
    });

    socket.on('connect_error', (err) => {
      console.error('Socket error:', err.message);
      document.getElementById('conn-banner').style.display = 'block';
    });

    socket.on('receive_message', (msg) => {
      appendMessage(msg, true);
    });

    socket.on('user_joined', ({ name }) => appendSystem(`${esc(name)} joined the chat`));
    socket.on('user_left', ({ name }) => appendSystem(`${esc(name)} left the chat`));
    socket.on('user_typing', ({ name }) => {
      typingEl.textContent = `${esc(name)} is typing…`;
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => typingEl.textContent = '', 2500);
    });
    socket.on('user_stop_typing', () => typingEl.textContent = '');

    // Send message
    function sendMsg() {
      const content = input.value.trim();
      if (!content) return;
      socket.emit('send_message', { content });
      input.value = '';
      socket.emit('stop_typing');
      isTyping = false;
    }

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); return; }
      if (!isTyping) { isTyping = true; socket.emit('typing'); }
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => { isTyping = false; socket.emit('stop_typing'); }, 1500);
    });

    function appendMessage(msg, scroll) {
      const isMe = msg.sender === user._id || msg.sender?.toString() === user._id?.toString();
      const time = new Date(msg.timestamp).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      const div = document.createElement('div');
      div.style.display = 'flex';
      div.style.flexDirection = 'column';
      div.style.alignItems = isMe ? 'flex-end' : 'flex-start';
      div.innerHTML = `
        ${!isMe ? `<span style="font-size:0.75rem;color:#aaa;margin:0 16px 2px">${esc(msg.senderName)}</span>` : ''}
        <div class="msg-bubble ${isMe ? 'me' : 'other'}">
          ${esc(msg.content)}
          <div class="msg-meta">${time}</div>
        </div>`;
      messagesEl.appendChild(div);
      if (scroll) scrollToBottom();
    }

    function appendSystem(text) {
      const div = document.createElement('div');
      div.style.cssText = 'text-align:center;font-size:0.78rem;color:#aaa;padding:4px;';
      div.textContent = text;
      messagesEl.appendChild(div);
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    loadHistory();
  </script>
</body>
</html>
