<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photos — Family Hub</title>

  <!-- Google Fonts: DM Serif Display (headings) + Nunito (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- External stylesheet — no inline styles, no frameworks -->
  <link rel="stylesheet" href="photos.css" />
</head>

<body>

  <!-- =============================================
       APP WRAPPER
       Flex row: sidebar + main content side by side
  ============================================= -->
  <div class="app-wrapper">

    <!-- ===========================================
         SIDEBAR NAVIGATION
         Fixed left column with logo + nav links
    =========================================== -->
    <aside class="sidebar" id="sidebar" aria-label="Main navigation">

      <!-- Logo / brand mark -->
      <div class="sidebar__logo">
        <span class="sidebar__logo-icon" aria-hidden="true">🏡</span>
        <div class="sidebar__logo-text">
          <span class="sidebar__logo-name">Family Hub</span>
          <span class="sidebar__logo-tagline">Our shared space</span>
        </div>
      </div>

      <!-- Primary navigation list -->
      <nav>
        <ul class="sidebar__nav" role="list">

          <li class="sidebar__nav-item">
            <a href="#" class="sidebar__nav-link" aria-label="Dashboard">
              <!-- SVG icon: grid/home -->
              <svg class="sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
              </svg>
              <span>Dashboard</span>
            </a>
          </li>

          <li class="sidebar__nav-item">
            <a href="#" class="sidebar__nav-link" aria-label="Calendar">
              <svg class="sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <span>Calendar</span>
            </a>
          </li>

          <li class="sidebar__nav-item">
            <a href="#" class="sidebar__nav-link" aria-label="Events">
              <svg class="sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
              </svg>
              <span>Events</span>
            </a>
          </li>

          <!-- ACTIVE item -->
          <li class="sidebar__nav-item sidebar__nav-item--active">
            <a href="#" class="sidebar__nav-link sidebar__nav-link--active" aria-current="page" aria-label="Photos">
              <svg class="sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>Photos</span>
              <!-- Active indicator pill -->
              <span class="sidebar__active-pill" aria-hidden="true"></span>
            </a>
          </li>

          <li class="sidebar__nav-item">
            <a href="#" class="sidebar__nav-link" aria-label="Chat">
              <svg class="sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
              <span>Chat</span>
            </a>
          </li>

          <li class="sidebar__nav-item">
            <a href="#" class="sidebar__nav-link" aria-label="Settings">
              <svg class="sidebar__nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
              <span>Settings</span>
            </a>
          </li>

        </ul>
      </nav>

      <!-- Bottom user profile strip -->
      <div class="sidebar__profile">
        <div class="sidebar__avatar" aria-hidden="true">JF</div>
        <div class="sidebar__profile-info">
          <span class="sidebar__profile-name">Johnson Family</span>
          <span class="sidebar__profile-members">5 members</span>
        </div>
      </div>

    </aside><!-- /sidebar -->


    <!-- ===========================================
         MAIN CONTENT AREA
         Holds the top-bar, stats, and dynamic views
    =========================================== -->
    <main class="main-content" id="main-content" aria-label="Photo Albums content">

      <!-- Top bar: breadcrumb + mobile menu button -->
      <header class="topbar">

        <!-- Mobile hamburger — toggles sidebar on small screens -->
        <button class="topbar__menu-btn" id="menu-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="sidebar">
          <span class="topbar__hamburger-line"></span>
          <span class="topbar__hamburger-line"></span>
          <span class="topbar__hamburger-line"></span>
        </button>

        <!-- Breadcrumb — JS updates this when inside an album -->
        <nav class="topbar__breadcrumb" aria-label="Breadcrumb">
          <ol class="topbar__breadcrumb-list" id="breadcrumb" role="list">
            <li class="topbar__breadcrumb-item topbar__breadcrumb-item--active">Photos</li>
          </ol>
        </nav>

      </header><!-- /topbar -->


      <!-- =========================================
           VIEW: ALBUM LIST
           Shown on first load; hidden when inside an album
      ========================================= -->
      <section class="view view--albums" id="view-albums" aria-label="Album list">

        <!-- Page heading block -->
        <div class="page-header">
          <h1 class="page-header__title">Photo Albums</h1>
          <p class="page-header__description">
            A place for every memory — browse your family's shared photo albums.
          </p>
        </div>

        <!-- Statistics row — populated by JS -->
        <div class="stats-row" id="stats-row" aria-label="Statistics">
          <!-- JS inserts .stat-card elements here -->
        </div>

        <!-- Album grid — populated by JS -->
        <div class="section-header">
          <h2 class="section-header__title">All Albums</h2>
        </div>
        <div class="album-grid" id="album-grid" role="list" aria-label="Albums">
          <!-- JS inserts .album-card elements here -->
        </div>

      </section><!-- /view-albums -->


      <!-- =========================================
           VIEW: PHOTO GRID (inside an album)
           Hidden initially; shown when an album is opened
      ========================================= -->
      <section class="view view--photos" id="view-photos" aria-label="Album photos" hidden>

        <!-- Album detail header — JS fills title/count -->
        <div class="page-header page-header--album">
          <button class="back-btn" id="back-btn" aria-label="Back to albums">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            <span>Albums</span>
          </button>
          <h1 class="page-header__title" id="album-detail-title"></h1>
          <p class="page-header__description" id="album-detail-desc"></p>
        </div>

        <!-- Photo grid — populated by JS -->
        <div class="photo-grid" id="photo-grid" role="list" aria-label="Photos">
          <!-- JS inserts .photo-cell elements here -->
        </div>

      </section><!-- /view-photos -->

    </main><!-- /main-content -->

  </div><!-- /app-wrapper -->


  <!-- =============================================
       LIGHTBOX MODAL
       Overlays entire screen; toggled by JS
  ============================================= -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo preview" hidden>

    <!-- Semi-transparent backdrop — clicking closes lightbox -->
    <div class="lightbox__backdrop" id="lightbox-backdrop" aria-hidden="true"></div>

    <!-- Lightbox panel -->
    <div class="lightbox__panel">

      <!-- Close button -->
      <button class="lightbox__close" id="lightbox-close" aria-label="Close photo preview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <!-- Previous photo -->
      <button class="lightbox__nav lightbox__nav--prev" id="lightbox-prev" aria-label="Previous photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <!-- Image + caption -->
      <figure class="lightbox__figure">
        <img class="lightbox__image" id="lightbox-image" src="" alt="" />
        <figcaption class="lightbox__caption" id="lightbox-caption"></figcaption>
      </figure>

      <!-- Next photo -->
      <button class="lightbox__nav lightbox__nav--next" id="lightbox-next" aria-label="Next photo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <!-- Counter: "3 / 12" -->
      <div class="lightbox__counter" id="lightbox-counter" aria-live="polite"></div>

    </div><!-- /lightbox-panel -->

  </div><!-- /lightbox -->


  <!-- External JS — deferred so DOM is ready -->
  <script src="photos.js" defer></script>

</body>
</html>
